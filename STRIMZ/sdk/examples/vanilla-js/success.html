<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success - Strimz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      text-align: center;
      background: white;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      color: #10b981;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #333;
    }

    p {
      color: #666;
      margin-bottom: 32px;
    }

    .details {
      background: #f9fafb;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
      text-align: left;
    }

    .details h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #333;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      font-family: monospace;
      color: #333;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .button:hover {
      background: #4f46e5;
    }

    .loading {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container" id="content">
    <div class="loading">Loading payment details...</div>
  </div>

  <script type="module">
    import { parsePaymentResultFromWindow } from 'https://unpkg.com/@strimz/sdk@1.0.0/dist/index.js'

    // Parse payment result from URL
    const result = parsePaymentResultFromWindow()

    const container = document.getElementById('content')

    if (!result) {
      container.innerHTML = `
        <h1>Invalid Payment</h1>
        <p>No payment information found.</p>
        <a href="index.html" class="button">Return to Home</a>
      `
    } else if (result.status === 'success') {
      container.innerHTML = `
        <svg class="success-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <h1>Payment Successful!</h1>
        <p>Thank you for your payment. You should receive a confirmation email shortly.</p>

        <div class="details">
          <h2>Payment Details:</h2>
          ${result.paymentId ? `
            <div class="detail-row">
              <span class="detail-label">Payment ID:</span>
              <span class="detail-value">${result.paymentId}</span>
            </div>
          ` : ''}
          ${result.transactionId ? `
            <div class="detail-row">
              <span class="detail-label">Transaction ID:</span>
              <span class="detail-value">${result.transactionId}</span>
            </div>
          ` : ''}
          ${result.subscriptionId ? `
            <div class="detail-row">
              <span class="detail-label">Subscription ID:</span>
              <span class="detail-value">${result.subscriptionId}</span>
            </div>
          ` : ''}
        </div>

        <a href="index.html" class="button">Return to Home</a>
      `
    } else {
      container.innerHTML = `
        <h1>Payment ${result.status}</h1>
        <p>${result.message || 'Something went wrong with your payment.'}</p>
        <a href="index.html" class="button">Try Again</a>
      `
    }
  </script>
</body>
</html>
